<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RunDB — can my machine run it?">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0f0c"/>
      <stop offset="100%" stop-color="#101613"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#36f97f" stop-opacity="0"/>
      <stop offset="18%" stop-color="#36f97f" stop-opacity="1"/>
      <stop offset="100%" stop-color="#36f97f" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#36f97f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#36f97f" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="frame"><rect x="0" y="0" width="900" height="240" rx="12"/></clipPath>
    <style>
      .mono { font-family: ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, Consolas, monospace; }
      .dim  { fill: #5e7a68; }
      .lit  { fill: #cdeed8; }
      .acc  { fill: #36f97f; }
      .amb  { fill: #f9c536; }
      @keyframes dash { to { stroke-dashoffset: -1320; } }
      .fpsline {
        stroke-dasharray: 1320;
        stroke-dashoffset: 0;
        animation: dash 9s linear infinite;
      }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }
      .rec { animation: pulse 2.2s ease-in-out infinite; }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="900" height="240" fill="url(#bg)"/>

    <!-- benchmark grid -->
    <g stroke="#1d2a22" stroke-width="1">
      <path d="M0 60H900M0 100H900M0 140H900M0 180H900"/>
      <path d="M100 0V240M200 0V240M300 0V240M400 0V240M500 0V240M600 0V240M700 0V240M800 0V240"/>
    </g>

    <!-- frametime graph -->
    <g transform="translate(0,0)">
      <path fill="url(#area)" d="M0,170 L60,162 L110,168 L160,148 L210,158 L260,128 L310,140 L360,118 L410,130 L460,102 L510,118 L560,96 L610,110 L660,84 L710,98 L760,76 L810,88 L860,64 L900,72 L900,240 L0,240 Z"/>
      <path class="fpsline" fill="none" stroke="url(#fade)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
        d="M0,170 L60,162 L110,168 L160,148 L210,158 L260,128 L310,140 L360,118 L410,130 L460,102 L510,118 L560,96 L610,110 L660,84 L710,98 L760,76 L810,88 L860,64 L900,72"/>
    </g>

    <!-- 1% low marker -->
    <g class="mono" font-size="11">
      <line x1="660" y1="84" x2="660" y2="190" stroke="#f9c536" stroke-width="1" stroke-dasharray="3 4" opacity="0.7"/>
      <text x="668" y="200" class="amb">1% LOW · 96</text>
    </g>

    <!-- title block -->
    <g class="mono">
      <text x="48" y="92" class="dim" font-size="13" letter-spacing="2">$ rundb --check "my-machine"</text>
      <text x="48" y="150" class="lit" font-size="58" font-weight="700" letter-spacing="-2">Run<tspan class="acc">DB</tspan><tspan class="acc cursor" font-weight="400">_</tspan></text>
      <text x="48" y="184" class="dim" font-size="15">can my machine run it? real rigs · measured FPS · no guesswork</text>
    </g>

    <!-- HUD stat chips -->
    <g class="mono" font-size="12" text-anchor="middle">
      <g transform="translate(636,34)">
        <rect x="-66" y="-17" width="132" height="30" rx="6" fill="#101813" stroke="#24382c"/>
        <text y="3"><tspan class="dim">AVG FPS </tspan><tspan class="acc" font-weight="700">144</tspan></text>
      </g>
      <g transform="translate(782,34)">
        <rect x="-66" y="-17" width="132" height="30" rx="6" fill="#101813" stroke="#24382c"/>
        <text y="3"><tspan class="dim">TIER </tspan><tspan class="acc" font-weight="700">EXCELLENT</tspan></text>
      </g>
    </g>

    <!-- live indicator -->
    <g class="mono" font-size="11">
      <circle class="rec" cx="56" cy="32" r="4" fill="#36f97f"/>
      <text x="68" y="36" class="dim" letter-spacing="2">COMMUNITY BENCHMARK FEED</text>
    </g>

    <rect x="0.5" y="0.5" width="899" height="239" rx="12" fill="none" stroke="#24382c"/>
  </g>
</svg>
